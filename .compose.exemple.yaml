# Ce fichier est un exemple de configuration Docker full stack
# il contient du SQL , du No-SQL , du PHP , du Python , du Node et des outils de dev (Caddy & Mailpit)
# Les ports sont configurés pour être exposés en dev (via des variables d'environnement) mais pas en prod (laisser les variables vides en prod)
# Il utilise des profils pour permettre de lancer uniquement les services nécessaires en dev ou en prod
# Pour les fichier de conf on garde tjrs root/docker -> files

services:
  # ==========================================
  # STACK NO-SQL (MongoDB 7.0)
  # ==========================================
  database-nosql:
    image: mongo:7.0
    container_name: mongo
    profiles: ["nosql"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      # On passe aussi l'user limité pour le script d'init
      MONGO_USER: ${MONGO_USERNAME}
      MONGO_PASS: ${MONGO_PASSWORD}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
    ports:
      - "${PORT_MONGO_DEV:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      # Le script d'init est dans /docker sans sous-dossier
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - mika-network

  # ==========================================
  # STACK SQL (MariaDB 11.2)
  # ==========================================
  database-sql:
    image: mariadb:11.2
    container_name: mysql_db
    profiles: ["sql"]
    environment:
      MYSQL_ROOT_PASSWORD: ${SQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SQL_DB_NAME}
      MYSQL_USER: ${SQL_USERNAME}
      MYSQL_PASSWORD: ${SQL_PASSWORD}
    ports:
      - "${PORT_SQL_DEV:-3306}:3306"
    volumes:
      - sql_data:/var/lib/mysql
    networks:
      - mika-network

  # ==========================================
  # BACK-ENDS (PHP & Python)
  # ==========================================
  back-php:
    build:
      context: .
      dockerfile: ./docker/PHP.Dockerfile
    container_name: php_api
    profiles: ["php"]
    environment:
      DATABASE_URL: ${SQL_URI}
    ports:
      - "${PORT_PHP_DEV:-8080}:80"
    volumes:
      - ./src-php:/var/www/html
    networks:
      - mika-network

  back-python:
    build:
      context: .
      dockerfile: ./docker/Python.Dockerfile
    container_name: python_api
    profiles: ["python"]
    environment:
      MONGODB_URI: ${MONGO_URI}
    ports:
      - "${PORT_PYTHON_DEV:-8000}:8000"
    volumes:
      - ./src-python:/app
    networks:
      - mika-network

  # ==========================================
  # FRONT-END (Node 20)
  # ==========================================
  app-node:
    container_name: front
    profiles: ["node"]
    build:
      context: .
      dockerfile: ./docker/Node.Dockerfile
    environment:
      # L'application utilise uniquement les accès "User" via les URIs
      MONGODB_URI: ${MONGO_URI}
      DATABASE_URL: ${SQL_URI}
      APP_ENV: ${APP_ENV}
      APP_URL: ${APP_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${PORT_NODE_DEV:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - mika-network

  # ==========================================
  # TOOLS (Caddy & Mailpit)
  # ==========================================
  server-dev:
    image: caddy:2.7-alpine
    container_name: caddy_dev
    profiles: ["dev"]
    ports:
      - "80:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
    networks:
      - mika-network

  mailer:
    image: axllent/mailpit:v1.15
    container_name: mailing
    profiles: ["mail"]
    ports:
      - "${PORT_MAILPIT_UI:-8025}:8025"
    networks:
      - mika-network

volumes:
  mongo_data:
  sql_data:

networks:
  mika-network:
    external: true