services:
  database:
    image: mongo:latest
    container_name: mongo
    environment:
      # Ces variables servent uniquement à CRÉER la base au premier lancement
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_DB_USER: ${MONGO_DB_USER}
      MONGO_DB_PASSWORD: ${MONGO_DB_PASSWORD}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      MONGO_URI: ${MONGO_URI}
    ports:
      - "${PORT_MONGO_DEV}:-" # permet d'exposer le port en dev mais pas en prod (laisser vide en prod dans .env)
    volumes:
      - meet-me_data:/data/db
    restart: always
    networks:
        - mika-network

  app:
    container_name: front
    build:
      context: . # IMPORTANT : On regarde tout le projet pour voir package.json
      dockerfile: ./docker/Node.Dockerfile
    restart: always
    working_dir: /app
    environment:
      # On passe ici toutes les variables dont Next.js a besoin
      APP_ENV: ${APP_ENV}
      APP_URL: ${APP_URL}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${PORT_APP_DEV}:-" # Expose le port 3000 en dev, pas en prod (laisser vide en prod dans .env)
    volumes:
      - .:/app
      - /app/node_modules # Protège les modules node du conteneur
    depends_on:
      - database
    networks:
      - mika-network

  server_dev:
    image: caddy:latest
    container_name: caddy_dev
    profiles:
      - dev
    environment:
      - APP_URL=${APP_URL:-http://localhost} # URL de l'app en dev, utilisée dans le Caddyfile
    restart: always
    ports:
      - "80:80" # HTTP
      # - "443:443" # HTTPS inutile en dev mais nécessaire pour la prod
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - mika-network

  mailer:
    container_name: mailing
    image: axllent/mailpit
    command: ["--smtp-auth-allow-insecure"]
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1

volumes:
  meet-me_data:
  caddy_data:
  caddy_config:

networks:
  mika-network:
    external: true